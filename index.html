<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strakke Witte Klok</title>
    <style>
        /* Diepzwart en schoon wit voor maximaal contrast */
        html, body {
            background-color: #000000 !important;
            color: #ffffff !important;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace; /* Monospace houdt de cijfers stil */
            overflow: hidden;
        }

        .clock-container {
            text-align: center;
        }

        /* De Datum boven de klok */
        #date {
            font-size: 3vw;
            text-transform: uppercase;
            letter-spacing: 0.8rem;
            margin-bottom: 10px;
            opacity: 0.6; /* Iets subtieler dan de tijd */
        }

        /* DE GIGANTISCHE KLOK */
        #clock {
            font-size: 20vw; /* Lekker groot, vult het scherm goed */
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2); /* Zachte witte gloed */
            white-space: nowrap;
        }

        /* Mobiele optimalisatie voor telefoons */
        @media (max-width: 768px) {
            #clock { font-size: 25vw; }
            #date { font-size: 5vw; letter-spacing: 0.3rem; }
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="date">LADEN...</div>
        <div id="clock">00:00:00</div>
    </div>

    <script>
        function update() {
            const now = new Date();
            
            // Tijd (HH:MM:SS) - Pakt de tijd van jouw computer/telefoon
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('clock').textContent = now.toLocaleTimeString('nl-NL', timeOptions);
            
            // Volledige Datum
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('nl-NL', dateOptions);
        }

        // Direct starten en elke seconde herhalen
        update();
        setInterval(update, 1000);
    </script>
</body>
</html>
