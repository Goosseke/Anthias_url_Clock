<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strakke Witte Klok - Geoptimaliseerd</title>
    <style>
        /* Basis instellingen voor volledig scherm */
        html, body {
            background-color: #000000 !important;
            color: #ffffff !important;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        .clock-container {
            text-align: center;
            width: 100%;
            /* Padding zorgt ervoor dat de cijfers nooit de rand raken */
            padding: 0 5vw; 
            box-sizing: border-box;
        }

        /* De Datum */
        #date {
            font-size: 2.5vw; /* Iets kleiner gemaakt voor betere balans */
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* DE KLOK: aangepast naar 15vw voor perfecte pasvorm */
        #clock {
            font-size: 15vw; 
            font-weight: 900;
            line-height: 1;
            /* Subtiele gloed voor diepte */
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1); 
            white-space: nowrap;
        }

        /* Mobiele versie: tekst wordt relatief groter op smalle schermen */
        @media (max-width: 768px) {
            #clock { font-size: 20vw; }
            #date { font-size: 4vw; letter-spacing: 0.2rem; }
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="date">LADEN...</div>
        <div id="clock">00:00:00</div>
    </div>

    <script>
        function update() {
            const now = new Date();
            
            // Tijd formatteren (Nederlandse stijl)
            const timeString = now.toLocaleTimeString('nl-NL', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit', 
                hour12: false 
            });
            document.getElementById('clock').textContent = timeString;
            
            // Datum formatteren
            const dateString = now.toLocaleDateString('nl-NL', { 
                weekday: 'long', 
                day: 'numeric', 
                month: 'long', 
                year: 'numeric' 
            });
            document.getElementById('date').textContent = dateString;
        }

        // Direct starten en elke seconde herhalen
        update();
        setInterval(update, 1000);
    </script>
</body>
</html>
