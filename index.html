<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthias Paasklok</title>
    <style>
        html, body {
            background-color: #000000 !important;
            color: #ffffff !important;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        .clock-container {
            text-align: center;
            width: 100%;
            padding: 0 5vw; 
            box-sizing: border-box;
            position: relative;
            z-index: 10; 
        }

        #date {
            font-size: 2.5vw;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        #clock {
            font-size: 15vw; 
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1); 
            white-space: nowrap;
        }

        /* GIGANTISCHE PASEN OBJECTEN (nu als IMG) */
        .easter-item {
            position: absolute;
            width: 250px; /* Grootte van het plaatje */
            height: auto;
            user-select: none;
            pointer-events: none;
            z-index: 5;
            will-change: transform;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="date">LADEN...</div>
        <div id="clock">00:00:00</div>
    </div>

    <script>
        // --- KLOK LOGICA ---
        function update() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('nl-NL', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
            });
            document.getElementById('clock').textContent = timeString;
            
            const dateString = now.toLocaleDateString('nl-NL', { 
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
            });
            document.getElementById('date').textContent = dateString;
        }
        setInterval(update, 1000);
        update();

        // --- PAAS LOGICA MET AFBEELDINGEN ---
        function createEasterItem() {
            const item = document.createElement('img');
            item.className = 'easter-item';
            
            // We gebruiken transparante PNG's van openbron bronnen
            const images = [
                'https://noto-website-2.storage.googleapis.com/emoji/emoji_u1f430.png', // Paashaas
                'https://noto-website-2.storage.googleapis.com/emoji/emoji_u1f95a.png'  // Ei
            ];
            
            item.src = images[Math.floor(Math.random() * images.length)];
            
            // Kleurfilters voor de eieren (werkt op Anthias)
            if (item.src.includes('u1f95a')) {
                const hues = [0, 90, 180, 270]; 
                const randomHue = hues[Math.floor(Math.random() * hues.length)];
                item.style.filter = `hue-rotate(${randomHue}deg) saturate(2)`;
            }

            const startX = Math.random() * window.innerWidth;
            let posY = window.innerHeight + 300; 
            let posX = startX;
            
            let speedY = -(Math.random() * 15 + 20); 
            const speedX = (Math.random() - 0.5) * 6;
            const gravity = 0.4; 
            
            let rotation = 0;
            const rotationSpeed = (Math.random() - 0.5) * 10;

            item.style.left = posX + 'px';
            item.style.top = posY + 'px';
            document.body.appendChild(item);

            const moveItem = setInterval(() => {
                speedY += gravity;
                posY += speedY;
                posX += speedX;
                rotation += rotationSpeed;
                
                item.style.top = posY + 'px';
                item.style.left = posX + 'px';
                item.style.transform = `rotate(${rotation}deg)`;
                
                if (posY > window.innerHeight + 600 && speedY > 0) {
                    clearInterval(moveItem);
                    item.remove();
                }
            }, 20);
        }

        setInterval(createEasterItem, 800);
    </script>
</body>
</html>
