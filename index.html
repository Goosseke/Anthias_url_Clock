<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalistische Witte Klok</title>
    <style>
        :root {
            /* Diep donkere achtergrond voor maximaal contrast */
            --bg-color: #03060a; 
            /* Fel, schoon wit voor de tekst */
            --text-color: #ffffff; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            /* Een strakker, modern lettertype (Monospace) */
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Subtiele animatie bij het laden */
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .clock-container {
            text-align: center;
        }

        #local-time {
            /* Groot en indrukwekkend */
            font-size: 15vw; 
            font-weight: 800;
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
            /* Zorgt dat de cijfers scherp blijven */
            -webkit-font-smoothing: antialiased;
        }

        .date-display {
            /* Subtieler dan de klok, maar goed leesbaar */
            font-size: 2vw;
            text-transform: uppercase;
