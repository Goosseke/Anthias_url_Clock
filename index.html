<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Klok</title>
    <style>
        :root {
            --bg-color: #050a14;
            --text-color: #ffffff;
            --accent-color: #00ffcc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .clock-container {
            text-align: center;
        }

        /* De klok is nu ongeveer 15% van de schermbreedte per cijfer */
        #local-time {
            font-size: 15vw; 
            font-weight: 900;
            color: var(--accent-color);
            text-shadow: 0 0 40px rgba(0, 255, 204, 0.2);
            margin: 0;
            line-height: 1;
        }

        .date-display {
            font-size: 2.5vw;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            opacity: 0.5;
            margin-bottom: 1rem;
        }

        /* Voor hele kleine schermen (mobiel) maken we de tekst iets leesbaarder */
        @media (max-width: 600px) {
            #local-time { font-size: 20vw; }
            .date-display { font-size: 5vw; }
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="date-display" id="date">LADEN...</div>
        <h1 id="local-time">00:00:00</h1>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // Tijd formatteren (HH:MM:SS)
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('local-time').textContent = now.toLocaleTimeString('nl-NL', timeOptions);
            
            // Datum formatteren
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('nl-NL', dateOptions);
        }

        // Elke seconde updaten
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
